<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>清流釣り ・ 河口釣魚</title>
<style>
  :root{
    --paper:#f7f4ec; --ink:#3c4043; --ink-soft:#6b7177;
    --panel:rgba(255,255,255,0.82); --line:rgba(60,64,67,0.12);
    --accent:#5fb0c9; --accent-deep:#3d8aa3; --gold:#e0a93b;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; overflow:hidden;
    font-family:"Hiragino Sans","Yu Gothic UI","Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    color:var(--ink); background:#cfe8f2; -webkit-font-smoothing:antialiased; }
  #scene{ position:fixed; inset:0; display:block; touch-action:none; user-select:none; -webkit-user-select:none; }
  .hud{ position:fixed; z-index:10; }

  /* 頂部資訊列（純資訊：不攔截點擊，讓整個畫面都能輕觸拋竿） */
  #topbar{ top:16px; left:50%; transform:translateX(-50%); display:flex; gap:10px;
    flex-wrap:wrap; justify-content:center; max-width:calc(100vw - 20px); pointer-events:none; }
  .chip{ background:var(--panel); backdrop-filter:blur(8px); border:1px solid var(--line);
    border-radius:999px; padding:8px 18px; font-size:14px; letter-spacing:.5px;
    box-shadow:0 4px 18px rgba(60,90,110,.10); display:flex; align-items:center; gap:8px; }
  .chip b{ font-weight:700; }
  .chip .ic{ font-size:16px; }

  /* 中央提示 */
  #hint{ bottom:46px; left:50%; transform:translateX(-50%); text-align:center;
    background:var(--panel); backdrop-filter:blur(8px); border:1px solid var(--line);
    border-radius:16px; padding:12px 26px; font-size:16px; letter-spacing:1px; max-width:92vw;
    box-shadow:0 6px 22px rgba(60,90,110,.12); transition:opacity .3s; pointer-events:none; }
  #hint small{ display:block; color:var(--ink-soft); font-size:12px; margin-top:3px; letter-spacing:.5px; }

  /* 起竿時機條 */
  #timing{ bottom:150px; left:50%; transform:translateX(-50%); width:min(420px,86vw);
    display:none; text-align:center; pointer-events:none;
    background:rgba(255,255,255,.78); backdrop-filter:blur(8px); border:1px solid var(--line);
    border-radius:18px; padding:14px 18px 12px; box-shadow:0 8px 26px rgba(60,90,110,.16); }
  #timing.show{ display:block; animation:pop .25s ease; }
  @keyframes pop{ from{ transform:translateX(-50%) scale(.9); opacity:0;} to{ transform:translateX(-50%) scale(1); opacity:1;} }
  #timing .label{ font-size:20px; font-weight:700; color:#e8553e; letter-spacing:3px;
    text-shadow:0 2px 10px rgba(255,255,255,.8); margin-bottom:10px;
    animation:throb .5s ease-in-out infinite alternate; }
  @keyframes throb{ to{ transform:scale(1.06);} }
  #track{ position:relative; height:26px; border-radius:13px; background:rgba(255,255,255,.7);
    border:1px solid var(--line); box-shadow:inset 0 2px 6px rgba(0,0,0,.06); overflow:hidden; }
  #zone{ position:absolute; top:0; bottom:0; background:linear-gradient(180deg,#9fe6a0,#5fc771);
    box-shadow:0 0 12px rgba(95,199,113,.6); }
  #zonePerfect{ position:absolute; top:0; bottom:0; background:linear-gradient(180deg,#ffe27a,#ffb02e); }
  #marker{ position:absolute; top:-4px; width:6px; height:34px; border-radius:3px;
    background:#3c4043; box-shadow:0 0 0 2px rgba(255,255,255,.85),0 2px 8px rgba(0,0,0,.3); left:0; }
  #timing .tip{ margin-top:8px; font-size:12px; color:var(--ink-soft); letter-spacing:1px; }

  /* 漁獲結果卡 */
  #result{ inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(30,50,60,.28); backdrop-filter:blur(3px); z-index:30; }
  #result.show{ display:flex; }
  .card{ width:min(540px,92vw); max-height:92vh; overflow-y:auto; background:var(--paper);
    border-radius:24px; box-shadow:0 24px 70px rgba(20,40,55,.35); border:1px solid rgba(255,255,255,.7);
    animation:rise .35s cubic-bezier(.2,.9,.3,1.2); }
  @keyframes rise{ from{ transform:translateY(24px) scale(.96); opacity:0;} to{ transform:none; opacity:1;} }
  .card .head{ padding:18px 24px 12px; text-align:center; position:relative; }
  .card .grade{ font-size:13px; letter-spacing:4px; color:var(--ink-soft); }
  .card .gradeBig{ font-size:26px; font-weight:800; letter-spacing:6px; margin-top:2px; }
  .card .body{ display:flex; gap:18px; padding:6px 24px 20px; align-items:stretch; }
  #previewWrap{ width:188px; flex:0 0 188px; border-radius:18px;
    background:radial-gradient(120% 120% at 50% 30%,#eaf6f9,#d6ebef);
    border:1px solid var(--line); display:flex; align-items:center; justify-content:center; }
  #previewCanvas{ width:188px; height:188px; }
  .info{ flex:1; min-width:0; }
  .info .name{ font-size:24px; font-weight:800; letter-spacing:1px; }
  .info .ja{ font-size:13px; color:var(--ink-soft); margin-top:2px; letter-spacing:1px; }
  .badge{ display:inline-block; padding:3px 12px; border-radius:999px; color:#fff;
    font-size:12px; font-weight:700; letter-spacing:2px; margin-top:8px; }
  .stats{ display:grid; grid-template-columns:1fr 1fr; gap:8px 14px; margin-top:14px; }
  .stat{ background:rgba(255,255,255,.6); border:1px solid var(--line); border-radius:12px; padding:8px 12px; }
  .stat .k{ font-size:11px; color:var(--ink-soft); letter-spacing:1px; }
  .stat .v{ font-size:17px; font-weight:700; }
  .stat .v.gold{ color:var(--gold); }
  .desc{ margin:16px 24px 6px; padding:14px 16px; background:rgba(255,255,255,.55);
    border:1px solid var(--line); border-radius:14px; font-size:13.5px; line-height:1.85;
    color:#4a5358; letter-spacing:.5px; }
  .card .foot{ padding:6px 24px 22px; display:flex; gap:12px; }
  .btn{ flex:1; border:none; cursor:pointer; padding:14px; border-radius:14px; font-size:15px;
    font-weight:700; letter-spacing:2px; transition:transform .1s, box-shadow .2s;
    font-family:inherit; }
  .btn:active{ transform:translateY(1px) scale(.99); }
  .btn.primary{ background:linear-gradient(180deg,#6fc0d6,#4d98b0); color:#fff;
    box-shadow:0 8px 20px rgba(77,152,176,.4); }
  .btn.ghost{ background:rgba(255,255,255,.7); color:var(--ink); border:1px solid var(--line); }

  /* 浮動工具按鈕 */
  #tools{ top:16px; right:16px; display:flex; flex-direction:column; gap:10px; }
  .toolbtn{ width:46px; height:46px; border-radius:14px; border:1px solid var(--line);
    background:var(--panel); backdrop-filter:blur(8px); cursor:pointer; font-size:20px;
    box-shadow:0 4px 16px rgba(60,90,110,.12); transition:transform .12s;
    display:flex; align-items:center; justify-content:center; }
  .toolbtn:hover{ transform:translateY(-2px); }

  /* 圖鑑 */
  #book{ inset:0; display:none; align-items:center; justify-content:center;
    background:rgba(30,50,60,.3); backdrop-filter:blur(4px); z-index:35; }
  #book.show{ display:flex; }
  .bookwrap{ width:min(960px,94vw); height:min(80vh,720px); background:var(--paper);
    border-radius:24px; box-shadow:0 24px 70px rgba(20,40,55,.4); display:flex; flex-direction:column; overflow:hidden; }
  .bookhead{ padding:18px 24px; border-bottom:1px solid var(--line); display:flex;
    align-items:center; justify-content:space-between; }
  .bookhead h2{ margin:0; font-size:20px; letter-spacing:3px; }
  .bookhead .sub{ font-size:13px; color:var(--ink-soft); }
  .bookbody{ flex:1; display:flex; min-height:0; }
  #bookGrid{ flex:1; overflow-y:auto; padding:16px; display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; align-content:start; }
  .fishcell{ background:rgba(255,255,255,.6); border:1px solid var(--line); border-radius:14px;
    padding:12px; cursor:pointer; transition:transform .1s, box-shadow .2s; position:relative; }
  .fishcell:hover{ transform:translateY(-2px); box-shadow:0 8px 18px rgba(60,90,110,.16); }
  .fishcell .dot{ width:10px; height:10px; border-radius:50%; position:absolute; top:12px; right:12px; }
  .fishcell .cn{ font-size:15px; font-weight:700; }
  .fishcell .cj{ font-size:11px; color:var(--ink-soft); margin-top:2px; }
  .fishcell .cv{ font-size:12px; color:var(--gold); margin-top:8px; font-weight:700; }
  .fishcell.locked{ color:#aab2b6; }
  .fishcell.locked .cn{ color:#aab2b6; }
  .bookside{ width:300px; flex:0 0 300px; border-left:1px solid var(--line); padding:18px;
    overflow-y:auto; background:rgba(255,255,255,.4); }
  .bookside .ph{ color:var(--ink-soft); font-size:13px; text-align:center; margin-top:40px; line-height:2; }

  /* 開場 */
  #intro{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; z-index:50;
    background:linear-gradient(160deg,#bfe3ee,#e7f4ee); }
  #intro.hide{ opacity:0; pointer-events:none; transition:opacity .6s; }
  .introcard{ text-align:center; }
  .introcard h1{ font-size:40px; letter-spacing:8px; margin:0; font-weight:800; color:#3a5560; }
  .introcard .en{ letter-spacing:6px; color:#6b8a93; margin:6px 0 26px; font-size:14px; }
  .introcard .startbtn{ background:linear-gradient(180deg,#6fc0d6,#4d98b0); color:#fff; border:none;
    padding:16px 48px; border-radius:16px; font-size:18px; letter-spacing:4px; font-weight:700;
    cursor:pointer; box-shadow:0 12px 30px rgba(77,152,176,.4); font-family:inherit; }
  .introcard .startbtn:active{ transform:translateY(1px); }
  .introcard .keys{ margin-top:22px; color:#6b8a93; font-size:13px; letter-spacing:1px; line-height:2; }
  #loading{ position:fixed; bottom:30px; left:50%; transform:translateX(-50%); color:#5a7a83; font-size:13px; }

  .toast{ position:fixed; top:84px; left:50%; transform:translateX(-50%) translateY(-16px);
    background:rgba(60,64,67,.92); color:#fff; padding:11px 24px; border-radius:14px; font-size:15px;
    letter-spacing:2px; opacity:0; transition:.3s; z-index:25; pointer-events:none; max-width:90vw; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  /* ---- 手機／窄螢幕自適應 ---- */
  @media (max-width:640px){
    #topbar{ top:8px; gap:6px; }
    .chip{ padding:6px 11px; font-size:12px; }
    .chip .ic{ font-size:14px; }
    #tools{ top:8px; right:8px; gap:8px; }
    .toolbtn{ width:40px; height:40px; font-size:18px; border-radius:12px; }
    #hint{ bottom:24px; font-size:14px; padding:10px 18px; }
    #timing{ bottom:118px; }

    .card .head{ padding:14px 16px 8px; }
    .card .gradeBig{ font-size:22px; letter-spacing:4px; }
    .card .body{ flex-direction:column; align-items:center; gap:12px; padding:6px 16px 14px; }
    #previewWrap{ width:150px; flex:0 0 150px; }
    #previewCanvas{ width:150px; height:150px; }
    .info{ width:100%; }
    .info .name{ font-size:21px; text-align:center; }
    .info .ja{ text-align:center; }
    .badge{ display:block; width:max-content; margin:8px auto 0; }
    .desc{ margin:12px 16px 4px; font-size:12.5px; line-height:1.7; }
    .card .foot{ padding:4px 16px 16px; }

    .bookwrap{ width:96vw; height:88vh; }
    .bookhead h2{ font-size:17px; letter-spacing:2px; }
    .bookbody{ flex-direction:column; }
    #bookGrid{ grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); padding:12px; }
    .bookside{ width:auto; flex:0 0 auto; border-left:none; border-top:1px solid var(--line); max-height:40%; }

    .introcard h1{ font-size:30px; letter-spacing:5px; }
    .introcard .startbtn{ padding:14px 36px; font-size:16px; }
    .introcard .keys{ font-size:12px; padding:0 16px; }

    /* 釣獲橫幅：縮小避免手機被裁切（inline 樣式需 !important 覆蓋） */
    #victory-title{ font-size:30px !important; letter-spacing:4px !important; }
    #victory-subtitle{ font-size:15px !important; letter-spacing:1px !important; padding:0 18px; }
    #perfbox, #errbox{ font-size:10px !important; }
  }
  @keyframes victory-pop {
    0% { transform: scale(0.6); opacity: 0; }
    100% { transform: scale(1.0); opacity: 1; }
  }
</style>
</head>
<body>
  <canvas id="scene"></canvas>

  <div id="victory-banner" style="position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:28;pointer-events:none;background:radial-gradient(circle, rgba(0,0,0,0) 30%, rgba(0,0,0,0.55) 100%)">
    <div style="text-align:center;animation:victory-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)">
      <div id="victory-title" style="font-size:46px;font-weight:900;color:#ffe27a;text-shadow:0 4px 14px rgba(0,0,0,0.6);letter-spacing:8px;margin-bottom:12px">成功釣獲！</div>
      <div id="victory-subtitle" style="font-size:22px;font-weight:bold;color:#ffffff;text-shadow:0 2px 8px rgba(0,0,0,0.6);letter-spacing:2px">獲得了珍貴的漁獲</div>
    </div>
  </div>


  <div id="topbar" class="hud">
    <div class="chip"><span class="ic">🪙</span><b id="coins">0</b> 元</div>
    <div class="chip"><span class="ic">🐟</span>圖鑑 <b id="dexcount">0</b>/<span id="dextotal">0</span></div>
    <div class="chip"><span class="ic">🎣</span>釣獲 <b id="catchcount">0</b></div>
  </div>

  <div id="tools" class="hud">
    <button class="toolbtn" id="btnBook" title="圖鑑">📖</button>
    <button class="toolbtn" id="btnPerf" title="畫質／效能切換">✨</button>
    <button class="toolbtn" id="btnMute" title="音效">🔊</button>
  </div>

  <div id="hint" class="hud">點擊畫面或按 <b>空白鍵</b> 拋竿<small>面向這片風光明媚的合流，靜待魚訊</small></div>

  <div id="timing" class="hud">
    <div class="label">起 竿 ！</div>
    <div id="track">
      <div id="zone"></div>
      <div id="zonePerfect"></div>
      <div id="marker"></div>
    </div>
    <div class="tip">指標進入綠區時按 空白鍵／點擊 起竿，黃心為完美</div>
  </div>

  <div id="result" class="hud">
    <div class="card">
      <div class="head">
        <div class="grade">釣 獲</div>
        <div class="gradeBig" id="gradeBig">成功</div>
      </div>
      <div class="body">
        <div id="previewWrap"><canvas id="previewCanvas" width="376" height="376"></canvas></div>
        <div class="info">
          <div class="name" id="rName">—</div>
          <div class="ja" id="rJa">—</div>
          <span class="badge" id="rBadge">—</span>
          <div class="stats">
            <div class="stat"><div class="k">體長</div><div class="v" id="rLen">—</div></div>
            <div class="stat"><div class="k">重量</div><div class="v" id="rWt">—</div></div>
            <div class="stat"><div class="k">稀有度</div><div class="v" id="rRare">—</div></div>
            <div class="stat"><div class="k">價值</div><div class="v gold" id="rVal">—</div></div>
          </div>
        </div>
      </div>
      <div class="desc" id="rDesc">—</div>
      <div class="foot">
        <button class="btn ghost" id="btnRelease">放生</button>
        <button class="btn primary" id="btnKeep">收藏並繼續</button>
      </div>
    </div>
  </div>

  <div id="book" class="hud">
    <div class="bookwrap">
      <div class="bookhead">
        <div><h2>魚 類 圖 鑑</h2><div class="sub" id="bookSub">已收集 0 種</div></div>
        <button class="toolbtn" id="btnBookClose">✕</button>
      </div>
      <div class="bookbody">
        <div id="bookGrid"></div>
        <div class="bookside" id="bookSide"><div class="ph">點選左側魚種<br/>查看詳細資料</div></div>
      </div>
    </div>
  </div>

  <div id="intro">
    <div class="introcard">
      <h1>清 流 釣 り</h1>
      <div class="en">RIVER CONFLUENCE FISHING</div>
      <button class="startbtn" id="btnStart">開 始 釣 魚</button>
      <div class="keys">空白鍵／點擊 = 拋竿・起竿　│　滑鼠移動 = 環顧四周<br/>魚兒咬鉤時，抓準時機條的綠色區段起竿</div>
    </div>
  </div>
  <div id="loading">載入中…</div>
  <div id="toast" class="toast"></div>

<script>
// 畫面內錯誤提示：即使模組載入失敗也能看到原因
window.addEventListener('error',e=>{
  // 只忽略瀏覽器擴充套件（錢包等）注入腳本的錯誤
  if(e.filename && /extension:\/\/|evmAsk|inpage|contentScript/i.test(e.filename)) return;
  showErr((e.message||'Error')+(e.filename?(' @ '+e.filename.split('/').pop()+':'+e.lineno):''));
});
window.addEventListener('unhandledrejection',e=>showErr('Promise: '+((e.reason&&e.reason.message)||e.reason)));
function showErr(msg){
  let d=document.getElementById('errbox');
  if(!d){ d=document.createElement('div'); d.id='errbox';
    d.style.cssText='position:fixed;left:0;right:0;bottom:0;z-index:99999;background:#b3261e;color:#fff;font:13px/1.6 ui-monospace,monospace;padding:10px 14px;white-space:pre-wrap;max-height:45vh;overflow:auto';
    (document.body||document.documentElement).appendChild(d); }
  d.textContent+='⚠ '+msg+'\n';
}
</script>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
} }
</script>

<script type="module">
const boot=document.getElementById('loading');
const setBoot=t=>{ if(boot){ boot.style.display='block'; boot.textContent=t; } };

let THREE;
try{
  setBoot('正在載入 three.js…');
  THREE = await import('three');
  setBoot('three.js 已載入，建立場景中…');
}catch(err){
  setBoot('three.js 載入失敗');
  showErr('three.js 載入失敗（CDN 被擋或無網路？）：'+((err&&err.message)||err));
  throw err;
}

// 後製套件（失敗則自動降級為直接渲染，不影響遊玩）
let POST=null, RoomEnvironment=null;
try{
  const [comp,rp,bloom,outp,sp,room]=await Promise.all([
    import('three/addons/postprocessing/EffectComposer.js'),
    import('three/addons/postprocessing/RenderPass.js'),
    import('three/addons/postprocessing/UnrealBloomPass.js'),
    import('three/addons/postprocessing/OutputPass.js'),
    import('three/addons/postprocessing/ShaderPass.js'),
    import('three/addons/environments/RoomEnvironment.js'),
  ]);
  POST={ EffectComposer:comp.EffectComposer, RenderPass:rp.RenderPass,
    UnrealBloomPass:bloom.UnrealBloomPass, OutputPass:outp.OutputPass, ShaderPass:sp.ShaderPass };
  RoomEnvironment=room.RoomEnvironment;
}catch(err){ console.warn('後製套件載入失敗，改用基本渲染：',err); }

/* =========================================================================
   1. 魚類資料：40 個真實魚種家族 × 5 種變異 = 200+ 種
   ========================================================================= */
const RARITY = [
  { key:'common',   label:'常見', color:'#9aa7b0', weight:100, mul:1   },
  { key:'uncommon', label:'普通', color:'#5fb55f', weight:52,  mul:2.2 },
  { key:'rare',     label:'稀有', color:'#4aa3ff', weight:20,  mul:5   },
  { key:'epic',     label:'史詩', color:'#b061ff', weight:6,   mul:14  },
  { key:'legend',   label:'傳說', color:'#f0a92e', weight:1.6, mul:42  },
];

// 體型模板：len=長, depth=體高(Y), width=側扁(Z), tail=尾型, tailSize, dorsal/anal/pect=鰭大小
const SHAPES = {
  normal: { len:2.0, depth:0.42, width:0.30, tail:'forked',  tailSize:0.6,  dorsal:0.5,  anal:0.32, pect:0.32 },
  slim:   { len:2.3, depth:0.30, width:0.22, tail:'forked',  tailSize:0.55, dorsal:0.4,  anal:0.28, pect:0.30 },
  eel:    { len:3.6, depth:0.18, width:0.17, tail:'pointed', tailSize:0.2,  dorsal:0.9,  anal:0.5,  pect:0.16, ribbon:true },
  flat:   { len:1.8, depth:0.50, width:0.14, tail:'round',   tailSize:0.34, dorsal:0.9,  anal:0.7,  pect:0.3,  flat:true },
  round:  { len:1.45,depth:0.60, width:0.56, tail:'fan',     tailSize:0.3,  dorsal:0.34, anal:0.3,  pect:0.4 },
  deep:   { len:1.8, depth:0.62, width:0.38, tail:'forked',  tailSize:0.5,  dorsal:0.7,  anal:0.5,  pect:0.34 },
  shark:  { len:3.0, depth:0.36, width:0.30, tail:'crescent',tailSize:0.7,  dorsal:1.15, anal:0.3,  pect:0.55 },

function hexToRgb(h){ const n=parseInt(h.replace('#',''),16); return [(n>>16)&255,(n>>8)&255,n&255]; }
function rgbToHex(r){ return '#'+r.map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join(''); }
function tintColor(hex, tint){
  if(!tint) return hex;
  let c = hexToRgb(hex);
  if(tint.type==='dark') return rgbToHex(c.map(v=>v*(1-tint.a*0.7)));
  if(tint.type==='mix'){ const t=hexToRgb(tint.c); return rgbToHex(c.map((v,i)=>v*(1-tint.a)+t[i]*tint.a)); }
  if(tint.type==='spot'){ return rgbToHex(c.map(v=>v*0.92)); }
  return hex;
}

const WEIGHT_TOTAL = SPECIES.reduce((s,sp)=>s+RARITY[sp.rarity].weight,0);
function rollSpecies(){
  let r = Math.random()*WEIGHT_TOTAL;
  for(const sp of SPECIES){ r -= RARITY[sp.rarity].weight; if(r<=0) return sp; }
  return SPECIES[0];
}
const SHAPE_DENSITY={ eel:0.0011, flat:0.0016, round:0.0024, normal:0.0019, slim:0.0015, deep:0.0021,
  shark:0.0016, tuna:0.0020, jelly:0.0005, turtle:0.0030, conch:0.0014 };
function rollCatch(sp){
  const t=Math.random();
  const len=+(sp.lenMin+(sp.lenMax-sp.lenMin)*t).toFixed(1);
  const wt=+((len**3)*(SHAPE_DENSITY[sp.shape]||0.0019)/1000).toFixed(2);
  const sizeNorm=t;
  return { len, wt, sizeNorm };
}

/* =========================================================================
   2. 參數化魚體 3D 模型（平滑圓潤，日系乾淨）
   ========================================================================= */
function fhash(a,b){ const n=Math.sin(a*127.1+b*311.7)*43758.5453; return n-Math.floor(n); }
// 依魚種挑選真實感花紋
function fishPattern(sp){
  const n=sp.baseZh;
  if(sp.albino) return 'none';
  if(/鯉/.test(n)) return 'koi';
  if(/鱒|鮭/.test(n)) return 'spots';
  if(/河豚|魨/.test(n)) return 'spots';
  if(/雷魚|鱧|鯰|鰻|鱔|泥鰍|鱖/.test(n)) return 'mottled';
  if(/比目|鰈/.test(n)) return 'mottled';
  if(/鬥魚|鰟鮍|石鮒|須鱲|馬口/.test(n)) return 'stripeV';
  if(/吳郭|羅非|鱸|鯛|石斑|鰕虎|彈塗/.test(n)) return 'banded';
  if(/香魚|溪哥|白鰷|沙梭|烏魚|鰱|鱅|青魚|苦花|翹嘴|何氏|鯽/.test(n)) return 'line';
  return 'gradient';
}

// 體側剪影控制點（x:0尾→1頭, 半徑比例）— 大頭圓潤，較可愛
const SIL_CUTE =[[0,0.03],[0.06,0.18],[0.16,0.54],[0.32,0.86],[0.5,1.0],[0.7,0.92],[0.86,0.66],[1.0,0.34]];
const SIL_EEL  =[[0,0.07],[0.08,0.5],[0.3,0.74],[0.55,0.82],[0.8,0.74],[0.93,0.58],[1.0,0.42]];
const SIL_ROUND=[[0,0.10],[0.1,0.55],[0.28,0.92],[0.48,1.0],[0.68,0.96],[0.86,0.66],[1.0,0.46]];
function silAt(arr,t){ for(let i=1;i<arr.length;i++){ if(t<=arr[i][0]){
  const a=arr[i-1],b=arr[i],k=(t-a[0])/((b[0]-a[0])||1); return a[1]+(b[1]-a[1])*k; } } return arr[arr.length-1][1]; }
function fishHasWhiskers(n){ return /鯰|鰻|鱔|泥鰍|鯉|何氏|鱸鰻/.test(n); }

function makeFishMesh(sp){
  const P=SHAPES[sp.shape]||SHAPES.normal;
  const g=new THREE.Group();
  const L=P.len, D=P.depth, W=P.width;
  const pattern=fishPattern(sp);
  const SIL = sp.shape==='eel'?SIL_EEL : sp.shape==='round'?SIL_ROUND : SIL_CUTE;
  const fishSil=(t)=>silAt(SIL,t);

  // 顏色（THREE.Color 已是線性，直接給 vertexColors）
  const cBody=new THREE.Color(sp.color1);
  const cBelly=new THREE.Color(sp.color2);
  const cPat = pattern==='koi' ? new THREE.Color('#d9762e') : cBody.clone().multiplyScalar(0.42);
  const cPat2= new THREE.Color('#f4efe8');

  // 身體：逐環掃描的橢圓截面（側扁），帶頂點花紋
  const segX=42, segR=16, ringN=segR+1;
  const pos=[], col=[], idx=[];
  for(let i=0;i<=segX;i++){
    const t=i/segX, x=(t-0.5)*L, s=fishSil(t), ry=s*D, rz=s*W;
    for(let j=0;j<=segR;j++){
      const ang=j/segR*Math.PI*2, y=Math.sin(ang)*ry, z=Math.cos(ang)*rz;
      pos.push(x,y,z);
      const yN = D>0 ? y/D : 0;
      const c=cBody.clone();
      if(yN<0) c.lerp(cBelly, Math.min(1,(-yN)*1.2));          // 腹部漸層
      if(pattern==='spots'){ if(fhash((t*26)|0,(ang*4.2)|0)<0.16 && yN>-0.4) c.lerp(cPat,0.7); }
      else if(pattern==='mottled'){ const m=fhash((t*15)|0,(ang*3.1)|0); if(m<0.42) c.lerp(cPat,(0.42-m)*1.2); }
      else if(pattern==='stripeV'){ if(Math.sin(t*Math.PI*9.0)>0.45 && yN>-0.55) c.lerp(cPat,0.6); }
      else if(pattern==='banded'){ if(Math.sin(t*Math.PI*6.0)>0.5) c.lerp(cPat,0.5); }
      else if(pattern==='line'){ if(Math.abs(yN)<0.12) c.lerp(cPat,0.55); }
      else if(pattern==='koi'){ const k=fhash((t*7)|0,(ang*1.5)|0);
        if(k<0.32) c.lerp(cPat,0.85); else if(k<0.48) c.lerp(cPat2,0.85); }
      col.push(c.r,c.g,c.b);
    }
  }
  for(let i=0;i<segX;i++) for(let j=0;j<segR;j++){
    const a=i*ringN+j, b=a+ringN; idx.push(a,b,a+1, b,b+1,a+1);
  }
  const bodyGeo=new THREE.BufferGeometry();
  bodyGeo.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  bodyGeo.setAttribute('color',new THREE.Float32BufferAttribute(col,3));
  bodyGeo.setIndex(idx); bodyGeo.computeVertexNormals();
  const bodyMesh=new THREE.Mesh(bodyGeo,new THREE.MeshStandardMaterial({ vertexColors:true, roughness:0.55, metalness:0.05, envMapIntensity:0.7 }));
  g.add(bodyMesh);
  // 吻部封口（避免頭部開孔穿透）
  const snout=new THREE.Mesh(new THREE.SphereGeometry(0.17*D,12,10),
    toonMat(cBelly.clone().lerp(cBody,0.6)));
  snout.position.set(L*0.5,0,0); snout.scale.set(0.7,1,1); addOutline(snout); g.add(snout);

  const finMat=toonMat(sp.finColor,{ side:THREE.DoubleSide, transparent:true, opacity:0.92 });
  const addFin=(shape,px=0,py=0,pz=0,rx=0,ry=0,rz=0)=>{
    const m=new THREE.Mesh(new THREE.ShapeGeometry(shape),finMat);
    m.position.set(px,py,pz); m.rotation.set(rx,ry,rz); g.add(m); return m;
  };

  // 尾鰭（依尾型）— 收進子群組以便擺尾動畫
  const th=D*1.35*(P.tailSize/0.5), tl=L*0.32*(P.tailSize/0.5), ts=new THREE.Shape();
  if(P.tail==='forked'){ ts.moveTo(0,0); ts.lineTo(-tl,th); ts.lineTo(-tl*0.5,0); ts.lineTo(-tl,-th); ts.closePath(); }
  else if(P.tail==='pointed'){ ts.moveTo(0,0); ts.lineTo(-tl,th*0.45); ts.lineTo(-tl*1.2,0); ts.lineTo(-tl,-th*0.45); ts.closePath(); }
  else if(P.tail==='crescent'){ ts.moveTo(0,0); ts.lineTo(-tl*0.55,th*1.25); ts.lineTo(-tl*0.2,0); ts.lineTo(-tl*0.55,-th*1.25); ts.closePath(); }  // 新月尾（鮪/鯊）
  else { ts.moveTo(0,0); for(let k=0;k<=8;k++){ const a=(-0.5+k/8)*Math.PI*0.92; ts.lineTo(-Math.cos(a)*tl, Math.sin(a)*th); } ts.closePath(); }
  const tailPivot=new THREE.Group(); tailPivot.position.set(-L*0.5,0,0);
  const tailMesh=new THREE.Mesh(new THREE.ShapeGeometry(ts),finMat); tailPivot.add(tailMesh); g.add(tailPivot);

  // 背鰭 / 臀鰭
  if(P.dorsal>0){ const d=new THREE.Shape();
    if(P.ribbon){ d.moveTo(L*0.32,D*0.7); d.lineTo(-L*0.4,D*0.55); d.lineTo(-L*0.4,D*0.8); d.lineTo(L*0.32,D*0.95); d.closePath(); }
    else { const x1=L*0.06,x2=L*0.32; d.moveTo(x1,D*0.78); d.lineTo(x2,D*0.78); d.lineTo((x1+x2)/2,D*(0.78+P.dorsal)); d.closePath(); }
    addFin(d); }
  if(P.anal>0 && !P.flat){ const an=new THREE.Shape(); const x1=-L*0.04,x2=-L*0.24;
    an.moveTo(x1,-D*0.72); an.lineTo(x2,-D*0.72); an.lineTo((x1+x2)/2,-D*(0.72+P.anal*0.7)); an.closePath();
    addFin(an); }

  // 胸鰭（兩側，會擺動）
  const pects=[];
  for(const zs of [1,-1]){ const pf=new THREE.Shape();
    pf.moveTo(0,0); pf.lineTo(-L*0.17*P.pect/0.32, D*0.28); pf.lineTo(-L*0.15*P.pect/0.32,-D*0.16); pf.closePath();
    pects.push(addFin(pf, L*0.18, -D*0.12, zs*W*1.02, -0.3, zs*0.9, 0)); }

  // 大眼睛（眼白＋瞳孔＋高光）→ 可愛感的關鍵
  const eR=Math.max(0.07, D*0.30);
  const eX=L*0.34, eY=D*0.24, eZ=Math.max(W, eR*0.4)*0.7 + eR*0.5;
  for(const zs of [1,-1]){
    const sclera=new THREE.Mesh(new THREE.SphereGeometry(eR,16,14), toonMat('#f8f5ef'));
    sclera.position.set(eX,eY,zs*eZ); g.add(sclera);
    const pupil=new THREE.Mesh(new THREE.SphereGeometry(eR*0.62,14,12),
      toonMat(sp.albino?'#c14a58':'#14171b'));
    pupil.position.set(eX+eR*0.46, eY-eR*0.05, zs*(eZ+eR*0.4)); g.add(pupil);
    const hl=new THREE.Mesh(new THREE.SphereGeometry(eR*0.24,8,8),new THREE.MeshBasicMaterial({color:'#fff'}));
    hl.position.set(eX+eR*0.7, eY+eR*0.32, zs*(eZ+eR*0.55)); g.add(hl);
  }

  // 鬚（鯰、鯉、鰻、鱔…）
  if(fishHasWhiskers(sp.baseZh)){
    const wMat=toonMat(cBody.clone().multiplyScalar(0.65));
    for(const zs of [1,-1]) for(let k=0;k<2;k++){
      const wl=L*(0.22+k*0.06);
      const w=new THREE.Mesh(new THREE.CylinderGeometry(0.005,0.013,wl,5),wMat);
      w.position.set(L*0.5+wl*0.32, -D*0.16-k*D*0.1, zs*W*0.55);
      w.rotation.z=-Math.PI/2-0.4; w.rotation.y=zs*(0.35+k*0.25); g.add(w);
    }
  }

  // 河豚刺
  if(sp.shape==='round'){
    const spMat=toonMat(cBody.clone().multiplyScalar(0.82));
    const up=new THREE.Vector3(0,1,0);
    for(let i=0;i<24;i++){
      const u=fhash(i,3), v=fhash(i,9), a=u*Math.PI*2, b=Math.acos(2*v-1);
      const dir=new THREE.Vector3(Math.sin(b)*Math.cos(a),Math.cos(b),Math.sin(b)*Math.sin(a));
      const surf=new THREE.Vector3(dir.x*L*0.42, dir.y*D*0.95, dir.z*W*0.95);
      if(surf.x>L*0.22) continue;             // 不長在臉上
      const spike=new THREE.Mesh(new THREE.ConeGeometry(0.045,0.16,6),spMat);
      spike.position.copy(surf); spike.quaternion.setFromUnitVectors(up,dir.clone().normalize());
      g.add(spike);
    }
  }

  g.userData.len=L;            // 頭朝 +X、背朝 +Y
  g.userData.tail=tailPivot;   // 供擺尾動畫
  g.userData.pects=pects;
  g.userData.ph=Math.random()*6.28;
  return g;
}

// --- 海洋生物（非魚體：水母 / 海龜 / 海螺）---
function makeJelly(sp){
  const g=new THREE.Group();
  const c1=new THREE.Color(sp.color1), c2=new THREE.Color(sp.color2);
  const bellMat=new THREE.MeshStandardMaterial({color:c1,roughness:0.3,metalness:0,
    transparent:true,opacity:0.62,emissive:c1,emissiveIntensity:0.25,side:THREE.DoubleSide});
  const bell=new THREE.Mesh(new THREE.SphereGeometry(0.8,24,16,0,6.283,0,Math.PI*0.62),bellMat);
  bell.scale.y=0.85; bell.position.y=0.2; g.add(bell);
  const core=new THREE.Mesh(new THREE.SphereGeometry(0.4,16,12),
    new THREE.MeshStandardMaterial({color:c2,transparent:true,opacity:0.5,emissive:c2,emissiveIntensity:0.3}));
  core.scale.y=0.7; core.position.y=0.16; g.add(core);
  const tMat=new THREE.MeshStandardMaterial({color:c1,transparent:true,opacity:0.6,emissive:c1,emissiveIntensity:0.2});
  const tentacles=[];
  for(let i=0;i<10;i++){ const a=i/10*6.283, tl=0.9+Math.random()*0.5;
    const te=new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.04,tl,5),tMat);
    te.position.set(Math.cos(a)*0.55,-tl*0.5+0.1,Math.sin(a)*0.55); g.add(te); tentacles.push(te);
  }
  g.userData.len=1.7; g.userData.kind='jelly'; g.userData.bell=bell; g.userData.tentacles=tentacles;
  return g;
}
function makeTurtle(sp){
  const g=new THREE.Group();
  const c1=new THREE.Color(sp.color1), c2=new THREE.Color(sp.color2);
  const skin=toonMat(c2.clone().multiplyScalar(0.9));
  const shell=new THREE.Mesh(new THREE.SphereGeometry(0.9,24,16),toonMat(c1));
  shell.scale.set(1.1,0.5,1.0); g.add(shell);
  const belly=new THREE.Mesh(new THREE.SphereGeometry(0.85,20,12),toonMat(c2));
  belly.scale.set(1.05,0.26,0.95); belly.position.y=-0.12; g.add(belly);
  const head=new THREE.Mesh(new THREE.SphereGeometry(0.28,16,14),skin);
  head.position.set(1.0,0.05,0); head.scale.set(1.2,0.9,0.9); g.add(head);
  for(const zs of[1,-1]){ const e=new THREE.Mesh(new THREE.SphereGeometry(0.06,10,8),toonMat('#14171b'));
    e.position.set(1.16,0.12,zs*0.12); g.add(e); }
  const flippers=[];
  const flip=(x,z,ry)=>{ const f=new THREE.Mesh(new THREE.SphereGeometry(0.3,12,8),skin);
    f.scale.set(1.4,0.16,0.5); f.position.set(x,-0.05,z); f.rotation.y=ry; g.add(f); flippers.push(f); };
  flip(0.5,0.7,0.6); flip(0.5,-0.7,-0.6); flip(-0.55,0.6,2.4); flip(-0.55,-0.6,-2.4);
  g.userData.len=2.0; g.userData.kind='turtle'; g.userData.flippers=flippers;
  return g;
}
function makeConch(sp){
  const g=new THREE.Group(); const mat=toonMat(sp.color1); const N=26;
  for(let i=0;i<N;i++){ const tp=i/N, a=tp*6.283*3.2, coil=0.7*(1-tp), sr=0.34*(1-tp*0.85)+0.03;
    const b=new THREE.Mesh(new THREE.SphereGeometry(sr,14,12),mat);
    b.position.set(Math.cos(a)*coil, tp*0.9-0.3, Math.sin(a)*coil); g.add(b);
  }
  g.rotation.z=0.5; g.userData.len=1.7; g.userData.kind='conch';
  return g;
}
// 依 shape 派發建模（魚 → makeFishMesh；其餘 → 特製）
function makeCreature(sp){
  if(sp.shape==='jelly')  return makeJelly(sp);
  if(sp.shape==='turtle') return makeTurtle(sp);
  if(sp.shape==='conch')  return makeConch(sp);
  return makeFishMesh(sp);
}

function toonMat(color,opts){

    bottom:{value:new THREE.Color('#e9f3f3')},
    sunCol:{value:new THREE.Color('#fff1cf')}, sunDir:{value:sunDir} },
  vertexShader:`varying vec3 vP; void main(){ vP=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);} `,
  fragmentShader:`uniform vec3 top,mid,bottom,sunCol,sunDir; varying vec3 vP;
    void main(){ vec3 d=normalize(vP); float h=clamp(d.y,0.0,1.0);
      vec3 c=mix(bottom,mid,smoothstep(0.0,0.35,h));

});

    h+=sin(p.x*0.6+t*1.1)*0.05; h+=sin(p.y*0.5-t*0.9)*0.04;
    h+=sin((p.x+p.y)*0.3+t*0.7)*0.028; h+=sin((p.x*0.9-p.y*0.7)+t*1.6)*0.014;
    return h; }`;
const waterUniforms={
  uTime:{value:0}, uDeep:{value:new THREE.Color('#1f86c8')}, uShallow:{value:new THREE.Color('#5cc6ee')},
  uSky:{value:new THREE.Color('#aee0fb')}, uHorizon:{value:HORIZON},
  uSun:{value:sunDir}, uSunCol:{value:new THREE.Color('#fff0d4')},
  uCam:{value:new THREE.Vector3()},
};
const waterMat=new THREE.ShaderMaterial({
  uniforms:waterUniforms,
  vertexShader:`uniform float uTime; varying vec3 vW; varying vec3 vN; varying float vD; ${WAVE_GLSL}
    void main(){ vec4 w=modelMatrix*vec4(position,1.0);
      float h=wv(w.xz,uTime); float e=0.3;
      float hx=wv(w.xz+vec2(e,0.0),uTime); float hz=wv(w.xz+vec2(0.0,e),uTime);
      w.y+=h; vN=normalize(vec3(-(hx-h)/e,1.0,-(hz-h)/e)); vW=w.xyz;
      gl_Position=projectionMatrix*viewMatrix*w; }`,
  fragmentShader:`uniform vec3 uDeep,uShallow,uSky,uHorizon,uSun,uSunCol,uCam; varying vec3 vW; varying vec3 vN;
    void main(){ vec3 v=normalize(uCam-vW); vec3 N=normalize(vN); vec3 L=normalize(uSun);
      float d=length(uCam.xz-vW.xz);
      // 遠處水面趨於鏡面（法線拉平），近處有起伏
      N=normalize(mix(N,vec3(0.0,1.0,0.0),smoothstep(24.0,140.0,d)));

      vec3 body=mix(uDeep,uShallow,clamp(N.y*0.5+0.35,0.0,1.0));
      vec3 reflc=mix(uSky,uHorizon,0.5);
      vec3 col=mix(body,reflc,min(fres*0.7,0.5));

function createBendingRod() {
  const rGroup = new THREE.Group();
  
  // 握把
  const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.065, 0.5, 12), toonMat('#2b2b2e'));
  handle.position.y = 0.2;
  rGroup.add(handle);
  
  // 捲線器
  const reel = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.09, 0.06, 16), toonMat('#caa24a'));
  reel.rotation.x = Math.PI / 2;
  reel.position.set(0.08, 0.55, 0.06);
  rGroup.add(reel);
  
  // 釣竿節段（5段骨架，由粗到細）
  const segments = [];
  const segLength = 0.52;
  const numSegs = 5;
  
  let parentNode = rGroup;
  let prevY = 0.45;
  
  for (let i = 0; i < numSegs; i++) {
    const segGroup = new THREE.Group();
    segGroup.position.set(0, prevY, 0);
    parentNode.add(segGroup);
    segments.push(segGroup);
    
    const rBase = 0.042 * (1 - i / numSegs * 0.65);
    const rTop = 0.042 * (1 - (i + 1) / numSegs * 0.65);
    const segGeo = new THREE.CylinderGeometry(rTop, rBase, segLength, 8);
    segGeo.translate(0, segLength / 2, 0);
    
    const segMesh = new THREE.Mesh(segGeo, toonMat('#4a3b30'));
    segGroup.add(segMesh);
    
    parentNode = segGroup;
    prevY = segLength;
  }
  
  // 竿尖定位節點
  const tipNode = new THREE.Group();
  tipNode.position.set(0, segLength, 0);
  parentNode.add(tipNode);
  
  rGroup.userData.segments = segments;
  rGroup.userData.tipNode = tipNode;
  rGroup.traverse(o => { if (o.isMesh) o.castShadow = true; });
  return rGroup;
}

function aimBoneWorld(bone, axisLocal, worldDir){

const CHARACTER_TARGET_HEIGHT=2.5;
function prepareLoadedCharacter(model){
  model.traverse(o=>{
    if(o.isMesh || o.isSkinnedMesh){
      o.castShadow=true;
      o.receiveShadow=true;
      o.frustumCulled=false;
      if(o.geometry){
        if(!o.geometry.boundingBox) o.geometry.computeBoundingBox();
        if(!o.geometry.boundingSphere) o.geometry.computeBoundingSphere();
      }
    }
  });
}
function isUsableBox(box){
  return !box.isEmpty()
    && Number.isFinite(box.min.x) && Number.isFinite(box.min.y) && Number.isFinite(box.min.z)
    && Number.isFinite(box.max.x) && Number.isFinite(box.max.y) && Number.isFinite(box.max.z);
}
function getSafeBounds(obj){
  obj.updateWorldMatrix(true,true);
  const box=new THREE.Box3();
  const meshBox=new THREE.Box3();
  obj.traverse(o=>{
    if((o.isMesh || o.isSkinnedMesh) && o.geometry){
      if(!o.geometry.boundingBox) o.geometry.computeBoundingBox();
      meshBox.copy(o.geometry.boundingBox).applyMatrix4(o.matrixWorld);
      if(isUsableBox(meshBox)) box.union(meshBox);
    }
  });
  if(box.isEmpty()) box.setFromObject(obj);
  const size=new THREE.Vector3();
  box.getSize(size);
  const valid=isUsableBox(box)
    && Number.isFinite(size.x) && Number.isFinite(size.y) && Number.isFinite(size.z)
    && size.y>0.001;
  return {box,size,valid};
}
function fitCharacterToAngler(model){
  const before=getSafeBounds(model);
  const rawScale=before.valid ? CHARACTER_TARGET_HEIGHT/before.size.y : 1;
  const scale=Number.isFinite(rawScale) && rawScale>=0.01 && rawScale<=20 ? rawScale : 1;
  model.scale.setScalar(scale);

  const after=getSafeBounds(model);
  const footY=after.valid && Number.isFinite(after.box.min.y) ? after.box.min.y : 0;
  model.position.set(angler.position.x, angler.position.y-footY, angler.position.z);
  model.rotation.y=Math.PI-0.35;                                 // 面向鏡頭
  model.updateWorldMatrix(true,true);

  return {size:before.size,scale,footY};
}

const linePoints = [];

const lineGeo=new THREE.BufferGeometry().setFromPoints(linePoints);

function updateLineCurve(start, end, control) {
  const pts = [];
  for (let i = 0; i <= LINE_SEGS; i++) {
    const t = i / LINE_SEGS;
    const p = new THREE.Vector3();
    p.x = (1 - t) * (1 - t) * start.x + 2 * (1 - t) * t * control.x + t * t * end.x;
    p.y = (1 - t) * (1 - t) * start.y + 2 * (1 - t) * t * control.y + t * t * end.y;
    p.z = (1 - t) * (1 - t) * start.z + 2 * (1 - t) * t * control.z + t * t * end.z;
    pts.push(p);
  }
  lineGeo.setFromPoints(pts);
}

    fragmentShader:`uniform sampler2D tDiffuse; uniform float uTime,uSat,uVig; varying vec2 vUv;

let actx=null, muted=false;
function audio(){ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); return actx; }
function blip(freq,dur,type='sine',vol=0.15){
  if(muted) return; const a=audio();
  const o=a.createOscillator(),g=a.createGain();
  o.type=type; o.frequency.value=freq; o.connect(g); g.connect(a.destination);
  g.gain.setValueAtTime(vol,a.currentTime); g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur);
  o.start(); o.stop(a.currentTime+dur);
}
function sfx(k){
  if(k==='cast') blip(420,0.18,'triangle',0.1);

  if(k==='win'){ blip(660,0.12,'sine',0.14); setTimeout(()=>blip(880,0.12,'sine',0.14),110);
    setTimeout(()=>blip(1180,0.2,'sine',0.14),230); }

}

const tip=new THREE.Vector3();
function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta(); now=performance.now();
  const t=clock.elapsedTime;
  if(mixer) mixer.update(dt);



  // FPS / GPU 診斷
  _fr++; _ft+=dt;
  if(_ft>=1.0){ _fps=Math.round(_fr/_ft); _fr=0; _ft=0;
    perfEl.textContent='GPU: '+GPU_INFO+'   |   '+_fps+' FPS   |   '+(lowMode?'省效能':'高畫質')+'（不自動降）';
  }
  waterUniforms.uTime.value=t;
  camera.getWorldPosition(waterUniforms.uCam.value);
  updateRain(dt, waterUniforms.uCam.value.x, waterUniforms.uCam.value.z);

  // 雲緩緩飄移
  for(const c of clouds){ c.position.x+=dt*c.userData.drift;
    if(c.position.x>140) c.position.x=-140; }

  // 環顧（平滑）：滑鼠控制相機位移與看點方向
  const px=tYaw*3.0, py=tPitch*3.0;

  // 根據狀態平滑過渡相機位置與看點
  if (!window.targetCamPos) window.targetCamPos = new THREE.Vector3();
  if (!window.targetLookAt) window.targetLookAt = new THREE.Vector3();
  if (!window.currentLookAt) window.currentLookAt = new THREE.Vector3(-1.0, 1.0, 0);

  if (state === S.CELEBRATE || state === S.RESULT) {
    // 勝利特寫：斜前方看角色正臉與懸在前方的魚
    window.targetCamPos.set(-3.5, 3.2, -5.0);
    window.targetLookAt.set(2.0, 2.0, 1.0);
  } else {
    // 釣魚（AC 構圖）：相機在左前方、略高，斜角橫看河面——角色在右、看得到正臉，浮標在水中央偏左
    window.targetCamPos.set(-6 + px, 5.0 - py, -11);
    window.targetLookAt.set(1.5 + px * 0.5, 1.2 + py * 0.3, -3.0);
  }

  // 幀率無關的 exponential decay lerp 係數
  const camPosDecay = (state === S.CELEBRATE) ? 6 : 8;
  const camLookDecay = (state === S.CELEBRATE) ? 6 : 8;
  camera.position.lerp(window.targetCamPos, 1 - Math.exp(-camPosDecay * dt));
  window.currentLookAt.lerp(window.targetLookAt, 1 - Math.exp(-camLookDecay * dt));
  camera.lookAt(window.currentLookAt);

  // 甩竿動作：後拉蓄力 → 前甩 → 回正
  let swing=0;
  if(castT>=0){ castT+=dt; const c=castT;
    if(c<0.14) swing=-(c/0.14)*0.7;                         // 後拉
    else if(c<0.40) swing=-0.7+((c-0.14)/0.26)*1.25;        // 前甩
    else if(c<0.78) swing=0.55*(1-(c-0.40)/0.38);           // 回正
    else { swing=0; castT=-1; }
  }
  let twitch=0;
  if(state===S.BITE) twitch=Math.sin(now*0.025)*0.05;       // 咬鉤抽動
  
  if (robotModel) {
    robotModel.updateWorldMatrix(true, true);
  }

  if (!robotModel) {
    rod.rotation.x=ROD_BASE_X+swing+twitch+Math.sin(t*1.4)*0.012;
    rod.rotation.z=ROD_BASE_Z+Math.sin(t*1.1)*0.01;
  } else {
    // ① 把手臂抬到身體前方（世界空間瞄準，不靠骨骼座標軸）：上臂朝前、前臂朝前上＋隨甩竿
    if (armU && armL) {
      const liftL = (state===S.CELEBRATE ? 0.6 : 0.3) - swing*0.7 + twitch*0.4;
      _wdU.copy(towardWater).setY(-0.55).normalize();  // 上臂自然下垂略朝前
      _wdL.copy(towardWater).setY(liftL).normalize();  // 前臂朝前、略上
      aimBoneWorld(armU, armUAxis, _wdU);
      aimBoneWorld(armL, armLAxis, _wdL);
    }
    robotModel.updateWorldMatrix(true, true);
    // ② 釣竿：握把貼到手骨世界座標，竿尖朝水面＋上抬（世界空間，不會反向）
    if (handBone) {
      handBone.getWorldPosition(_handPos);
      _aim.copy(CAST).sub(_handPos); _aim.y = 0;
      if (_aim.lengthSq() < 1e-4) _aim.set(0, 0, -1);
      _aim.normalize();
      const lift = (state===S.CELEBRATE ? 1.0 : 0.6) - swing*1.0 + twitch*0.4;  // 竿尖斜上約30°
      _aim.y += lift; _aim.normalize();
      rod.quaternion.setFromUnitVectors(UP_Y, _aim);
      // 握把沿竿向往前推離身體（推的方向隨甩竿變 → 根部也會跟著動，不再像插死的支點）
      rod.position.copy(_handPos).addScaledVector(_aim, 0.35);
    }
  }

  // 釣竿彎曲動畫
  let bend = 0;
  if (state === S.CASTING) {
    bend = swing * 0.6;
  } else if (state === S.BITE) {
    bend = twitch * 1.2;
  } else if (state === S.CELEBRATE) {
    bend = 0.55 + Math.sin(t * 4) * 0.05;
  }
  const segments = rod.userData.segments;
  if (segments) {
    const anglePerSeg = bend / segments.length;
    for (let i = 0; i < segments.length; i++) {
      segments[i].rotation.x = anglePerSeg;
    }
  }

  // 點景魚悠游
  for(const m of ambient){
    m.userData.ph+=dt*m.userData.spd;
    m.position.x=Math.sin(m.userData.ph)*m.userData.rad;
    m.position.z=m.userData.cz+Math.cos(m.userData.ph)*m.userData.rad*0.4;
    const dx=Math.cos(m.userData.ph), dz=-Math.sin(m.userData.ph)*0.4;
    m.rotation.y=Math.atan2(-dz,dx);
    m.position.y=-0.55+Math.sin(t+m.userData.ph)*0.05;
    if(m.userData.tail) m.userData.tail.rotation.y=Math.sin(t*6+m.userData.ph*3)*0.5;
  }

  // 浮標
  if(bobber.visible){
    let bx=CAST.x,bz=CAST.z;
    if(state===S.CASTING){
      const k=Math.min(1,(now-castStart)/650);
      bx=castFrom.x+(CAST.x-castFrom.x)*k;
      bz=castFrom.z+(CAST.z-castFrom.z)*k;
      const arc=Math.sin(k*Math.PI)*2.2;
      bobber.position.set(bx, castFrom.y+(WATER_Y-castFrom.y)*k+arc, bz);
      if(k>=1){ spawnRipple(new THREE.Vector3(CAST.x,WATER_Y,CAST.z)); startWait(); }
    } else {
      const wh=waveHeight(bx,bz,t);
      let dip=0;
      if(state===S.BITE){ dip=-0.05-0.05*Math.abs(Math.sin((now-biteStart)*0.02)); }
      bobber.position.set(bx, WATER_Y+wh+dip+0.02, bz);
      bobber.rotation.z=Math.sin(t*2)*0.06;
    }
    // 釣線
    camera.updateMatrixWorld();
    getRodTipPos(tip);
    const mid=tip.clone().lerp(bobber.position,0.5); mid.y-=0.38;
    updateLineCurve(tip, bobber.position, mid);
  }

  // 魚影游向浮標（WAITING）→ 抵達即咬鉤
  if(state===S.WAITING){
    const k=Math.min(1,(now-shadowStart)/shadowDur), e=k*k*(3-2*k), wob=(1-e)*0.5;
    fishShadow.position.set(
      shadowFrom.x+(CAST.x-shadowFrom.x)*e+Math.sin(t*3+1)*wob, WATER_Y+0.02,
      shadowFrom.z+(CAST.z-shadowFrom.z)*e+Math.cos(t*3)*wob);
    const sdx=CAST.x-fishShadow.position.x, sdz=CAST.z-fishShadow.position.z;
    if(sdx*sdx+sdz*sdz>0.0004) fishShadow.rotation.y=Math.atan2(sdx,sdz);
    if(k>=1) startBite();
  }
  // 起竿時機條（BITE）
  if(state===S.BITE){
    const prog=Math.min(100,(now-biteStart)/curSweep*100);
    elMarker.style.left=prog+'%';
    if(now-biteStart>=curSweep){ endBite(); fail('魚兒掙脫了，下次抓準時機'); }
  }
  // 起魚動畫（CATCH）：魚甩出水面、沿弧線飛向竿尖
  if(state===S.CATCH && leapFish){
    const k=(now-leapStart)/850;
    if(k>=1){
      // 進入慶祝狀態 (CELEBRATE)
      state=S.CELEBRATE;
      window.celebrateStart = now;

      // 慶祝時釣竿保持顯示
      if (rod) rod.visible = true;

      // 魚固定懸在角色前方、鏡頭看得到的高度
      const tip = new THREE.Vector3();
      getRodTipPos(tip);
      const fishPos = new THREE.Vector3(2.0, 2.2, 1.2);
      leapFish.position.copy(fishPos);
      updateLineCurve(tip, fishPos, tip.clone().lerp(fishPos, 0.5));

      // 顯示獲得橫幅
      const vb = document.getElementById('victory-banner');
      if (vb && pendingCatch) {
        document.getElementById('victory-subtitle').textContent = `成功釣獲 ${pendingCatch.sp.zh} (${pendingCatch.c.len} cm)！`;
        vb.style.display = 'flex';
      }

      sfx('win');
    } else {
      const p=leapFrom.clone().lerp(leapTo,k); p.y+=Math.sin(k*Math.PI)*1.9;
      leapFish.position.copy(p);
      leapFish.rotation.z=Math.PI*0.5-k*2.2; leapFish.rotation.y+=0.3;
      if(leapFish.userData.tail) leapFish.userData.tail.rotation.y=Math.sin(t*22)*0.7;
      camera.updateMatrixWorld();
      getRodTipPos(tip);
      const mid = tip.clone().lerp(p, 0.5);
      mid.y -= 0.2;
      updateLineCurve(tip, p, mid);
    }
  }

  // 勝利慶祝階段邏輯 (CELEBRATE)
  if (state === S.CELEBRATE) {
    const elapsed = now - window.celebrateStart;

    // 取得即時竿尖世界位置，更新垂懸魚與拉直釣線 (使魚活靈活現扭動)
    camera.updateMatrixWorld();
    getRodTipPos(tip);
    
    const _bt = elapsed / 1000;
    const _hop = Math.max(0, Math.sin(_bt * 6.5)) * Math.max(0, 1 - _bt / 3) * 0.6; // 跳幾下、遞減
    const fishPos = new THREE.Vector3(2.0, 2.2 + _hop, 1.2 + Math.cos(t * 3) * 0.04); // 角色前方、看得到
    
    if (leapFish) {
      leapFish.position.copy(fishPos);
      // 面向鏡頭晃動 wiggling
      leapFish.rotation.set(0.2, t * 1.5, Math.sin(t * 15) * 0.25);
      if (leapFish.userData.tail) {
        leapFish.userData.tail.rotation.y = Math.sin(t * 26) * 0.6;
      }
    }
    
    // 更新釣線，使用波動曲線模擬晃動
    const mid = tip.clone().lerp(fishPos, 0.5);
    mid.x += Math.sin(t * 8) * 0.04;
    mid.z += Math.cos(t * 6) * 0.04;
    updateLineCurve(tip, fishPos, mid);

    // 慶祝持續 3 秒後自動彈出結果卡
    if (elapsed >= 3000 && pendingCatch) {
      // 移除垂懸的魚與隱藏釣線
      if (leapFish) {
        scene.remove(leapFish);
        leapFish = null;
      }
      fishLine.visible = false;

      // 隱藏橫幅
      const vb = document.getElementById('victory-banner');
      if (vb) vb.style.display = 'none';

      // 彈出統計結果
      showResult(pendingCatch.sp, pendingCatch.c, pendingCatch.value, pendingCatch.grade);
      state = S.RESULT;
    }
  }
  // 水花
  for(let i=splashes.length-1;i>=0;i--){ const d=splashes[i]; d.userData.t+=dt;
    d.userData.v.y-=9.5*dt; d.position.addScaledVector(d.userData.v,dt);
    if(d.position.y<WATER_Y||d.userData.t>1.3){ scene.remove(d); splashes.splice(i,1); } }

  // 漣漪
  for(let i=ripples.length-1;i>=0;i--){
    const r=ripples[i]; r.userData.t+=dt;
    const s=1+r.userData.t*4; r.scale.set(s,s,s);
    r.material.opacity=Math.max(0,0.7-r.userData.t*0.9);
    if(r.userData.t>0.8){ scene.remove(r); ripples.splice(i,1); }
  }

  renderMain();

  if(pActive && pFish){ pFish.rotation.y+=dt*0.6;
    const u=pFish.userData;
    if(u.tail) u.tail.rotation.y=Math.sin(t*6)*0.5;
    if(u.pects) for(const p of u.pects) p.rotation.x=-0.3+Math.sin(t*5)*0.25;
    if(u.kind==='jelly' && u.bell){ u.bell.scale.y=0.85*(1+Math.sin(t*2.5)*0.12);
      if(u.tentacles) for(let i=0;i<u.tentacles.length;i++) u.tentacles[i].rotation.x=Math.sin(t*2+i)*0.18; }
    if(u.kind==='turtle' && u.flippers) for(let i=0;i<u.flippers.length;i++) u.flippers[i].rotation.z=Math.sin(t*2+i*1.4)*0.4;
    pRenderer.render(pScene,pCam); }
}

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
  if(composer) composer.setSize(innerWidth,innerHeight);
});

/* =========================================================================
   10. 啟動
   ========================================================================= */
load(); updateHUD();
document.getElementById('loading').style.display='none';
animate();

const introEl=document.getElementById('intro');
function startGame(){
  if(state!==S.LOCK) return;
  sgCalls++;
  introEl.classList.add('hide');
  state=S.READY;                       // 先進入可拋竿狀態
  try{ audio(); }catch(e){}            // 音訊失敗也不擋遊戲
  setHint('🎣 點擊或按 <b>空白鍵</b> 拋竿<small>面向這片風光明媚的合流，靜待魚訊</small>');
}
document.getElementById('btnStart').onclick=startGame;
introEl.addEventListener('pointerdown',startGame); // 點開場任何處皆可開始
</script>
